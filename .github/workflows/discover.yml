name: Discovery

on:
  workflow_dispatch:
  create:
    branches:
      - '**'

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Run extraction
        run: python -m discovery extract --config discovery-config.yml

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet discovery/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push (branch creation)
        if: steps.diff.outputs.changes == 'true' && github.event_name == 'create'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add discovery/
          git commit -m "chore(discovery): update metadata [auto]"
          git push

      - name: Create PR to main (workflow_dispatch)
        if: steps.diff.outputs.changes == 'true' && github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          base: main
          title: "Discovery: Update metadata"
          body: "Automated metadata discovery update from Snowsight trigger."

      - name: Upload errors (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: discovery-errors
          path: discovery/_errors/
